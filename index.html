<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a1a0d;--sf:#112214;--sf2:#1a3320;--gd:#d4a843;--g2:#f0c96a;--mt:#7a9e82;--tx:#e8dfc8;--td:#9aaf9e}
body{font-family:'Raleway',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
#splash{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a3320 0%,#0a1a0d 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .7s}
#splash img{width:260px;height:260px;object-fit:contain;filter:drop-shadow(0 0 30px rgba(212,168,67,.5))}
#splash p{color:var(--gd);margin-top:16px;font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:4px;opacity:.8}
.hero{background:linear-gradient(180deg,#0a1a0d 0%,#112214 100%);display:flex;flex-direction:column;align-items:center;padding:28px 16px 20px;position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--gd),transparent)}
.hero img{width:200px;height:200px;object-fit:contain;filter:drop-shadow(0 4px 20px rgba(212,168,67,.4))}
.hero-d{font-family:'Cinzel',serif;color:var(--gd);font-size:1rem;letter-spacing:2px;margin-top:10px;text-shadow:0 0 20px rgba(212,168,67,.4)}
.hero-s{color:var(--mt);font-size:.72rem;letter-spacing:3px;text-transform:uppercase;margin-top:4px}
nav{background:var(--sf);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:0;z-index:100;border-bottom:2px solid rgba(212,168,67,.15);box-shadow:0 2px 12px rgba(0,0,0,.5)}
nav::-webkit-scrollbar{display:none}
nav button{background:none;border:none;color:var(--td);padding:14px 16px;white-space:nowrap;font-family:'Raleway',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;flex-shrink:0;transition:all .2s}
nav button.active{color:var(--gd);border-bottom-color:var(--gd);background:rgba(212,168,67,.06)}
.tab{display:none;padding:16px;max-width:620px;margin:0 auto;padding-bottom:50px}
.tab.active{display:block}
.card{background:var(--sf);border:1px solid rgba(212,168,67,.12);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.card h2{font-family:'Cinzel',serif;color:var(--gd);font-size:.95rem;letter-spacing:1px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(212,168,67,.15)}
.card h3{color:var(--g2);font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:12px 0 5px}
.card p,.card li{font-size:.85rem;line-height:1.7;color:var(--tx)}
.card ul{padding-left:18px}.card li{margin-bottom:3px}
.fi{border-bottom:1px solid rgba(255,255,255,.06)}.fi:last-child{border-bottom:none}
.fq{width:100%;background:none;border:none;text-align:left;padding:12px 0;font-size:.85rem;font-weight:700;color:var(--tx);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;font-family:'Raleway',sans-serif}
.fa{display:none;padding-bottom:12px;font-size:.83rem;color:var(--td);line-height:1.7}
.fi.open .fa{display:block}.fi.open .fq{color:var(--gd)}
.ch{transition:transform .2s;font-style:normal;flex-shrink:0;color:var(--gd)}.fi.open .ch{transform:rotate(180deg)}
.day-header{background:linear-gradient(135deg,var(--sf2),#0f2418);border:1px solid rgba(212,168,67,.25);color:var(--gd);padding:10px 14px;border-radius:10px;font-family:'Cinzel',serif;font-size:.88rem;letter-spacing:1px;margin-bottom:10px}
.event{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}.event:last-child{border-bottom:none}
.event-time{font-size:.72rem;color:var(--gd);font-weight:700;min-width:60px;padding-top:2px}
.event-desc{font-size:.84rem;color:var(--tx);line-height:1.5}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}.row:last-child{border-bottom:none}
.rn{font-size:.85rem;font-weight:700;color:var(--tx)}
.badge{font-size:.72rem;padding:4px 12px;border-radius:20px;font-weight:700;white-space:nowrap}
.paid{background:rgba(34,139,34,.25);color:#6fdb6f;border:1px solid rgba(34,139,34,.3)}
.unpaid{background:rgba(180,40,40,.25);color:#f08080;border:1px solid rgba(180,40,40,.3)}
.partial{background:rgba(180,140,20,.25);color:#e8c840;border:1px solid rgba(180,140,20,.3)}
.cbtn{background:linear-gradient(135deg,#1a4a22,#0f2c14);color:var(--gd);border:1px solid rgba(212,168,67,.35);border-radius:20px;padding:7px 16px;font-size:.76rem;font-weight:700;text-decoration:none;display:inline-block;white-space:nowrap;font-family:'Raleway',sans-serif}
.tee{display:inline-block;margin-top:10px;background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.3);color:var(--gd);padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:700}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,.3),transparent);margin:8px 0}
</style>
</head>
